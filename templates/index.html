<!DOCTYPE html>
<html>
<head>
    <title>Creed Downloader</title>
    <meta name="description" content="Official Creed and QueenDosted Downloader">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { padding: 12px; margin: 10px 0; width: 90%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 24px; background: #ff0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #cccccc; cursor: not-allowed; }

        /* The Spinner CSS */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none; /* Hidden by default */
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Creed Downloader</h1>
        <form id="downloadForm" action="/download-web" method="get">
            <input type="text" name="url" placeholder="Paste YouTube Link" required>
            <input type="text" name="name_file" placeholder="Save as (e.g. MyVideo)" required>
            <button type="submit" id="submitBtn">Download Video</button>
        </form>

        <div id="loader" class="loader"></div>
        <p id="statusMsg" style="display:none;">Downloading... please wait.</p>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');

        form.onsubmit = function() {
            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.style.display = "block";
            statusMsg.style.display = "block";
        };
    </script>
</body>

</html>
