<!DOCTYPE html>
<html>
<head>
    <title>YouTube Downloader</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px 0; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #ff0000; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>YouTube Downloader</h1>
        <form action="/download-web" method="get">
            <input type="text" name="url" placeholder="Paste YouTube Link" required><br>
            <input type="text" name="name_file" placeholder="Save as (e.g. MyVideo)" required><br>
            <button type="submit">Download Video</button>
        </form>
    </div>
</body>
</html>
